# Production stack for a single VPS (Hostinger KVM 2): Postgres + NestJS API + Caddy (auto-HTTPS).
# See docs/vps-deployment.md for the full step-by-step. Secrets live in .env (NEVER committed).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: keepinv
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Bound to localhost only — never exposed to the public internet. Lets host tools
    # (pg_dump/psql) connect; the API reaches it over the private compose network as `db`.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keepinv"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000" # internal only; Caddy proxies to it
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
